<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGC Universe</title>
  <style>
    body {
      background: #0a0c10;
      color: white;
      font-family: system-ui;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 28px;
      width: 300px;
    }
    input, button {
      width: 100%;
      padding: 0.75rem;
      margin: 0.5rem 0;
      border-radius: 40px;
      border: 1px solid #333;
      background: rgba(0,0,0,0.6);
      color: white;
    }
    button {
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    .logo { font-size: 2rem; text-align: center; margin-bottom: 1rem; color: gold; }
    .error { color: red; font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <div class="glass">
    <div class="logo">🔺 GGC</div>
    <h3 style="text-align:center">Enter the System</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn" style="background:transparent; border:1px solid gold;">Login</button>
    <div id="error" class="error"></div>
  </div>
  <script>
    const API_URL = window.location.origin;
    
    document.getElementById('signupBtn').onclick = async () => {
      const res = await fetch(`${API_URL}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        window.location.href = '/feed.html';
      } else {
        document.getElementById('error').innerText = data.error;
      }
    };
    
    document.getElementById('loginBtn').onclick = async () => {
      const res = await fetch(`${API_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        window.location.href = '/feed.html';
      } else {
        document.getElementById('error').innerText = data.error;
      }
    };
  </script>
</body>
</html>
